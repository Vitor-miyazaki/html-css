<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <!--Número, mês, data, hora, problemas dos formulários em html, email, telefone, agrupamento-->

    <fieldset>
        <legend>Dados Pessoais</legend>
        <form action="cadastro.php" method="post" autocomplete="on">
            <p><label for="imedia">Média:</label> <input type="number" name="media" id="imedia" required min="0" max="10" step="0.5" placeholder="0 a 10" ></p>
            <p><label for="imes">Período:</label> <input type="month" name="mes" id="imes" required> </p>
            <p><label for="idata">Data completa:</label> <input type="date" name="data" id="idata" required> </p>
            <p><label for="ihora">Hora:</label> <input type="time" name="hora" id="ihora" required> </p>
            <p><label for="iemail">Email:</label> <input type="email" name="email" id="iemail" required autocomplete="email"></p>
            <p><label for="itel">Telefone:</label> <input type="tel" name="tel" id="itel" required placeholder="ddd + número"></p>
            <input type="submit" value="Enviar"> <input type="reset" value="Limpar">
        </form>
    </fieldset>
    
    <p>O problema dos formulários em html é a incompátibilidade com os navegadores, onde alguns recursos não funcionam de forma adequada para todos. A única solução é utilizando programação (javascript, python...).</p>

</body>
</html>
