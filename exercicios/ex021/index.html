<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            border-collapse: collapse;
            
        }

        

        .azul{
            background-color: blue;
            color: white;

        }

        .amarelo{
            background-color: yellow;
        }

        .verde{
            background-color: green;
            color: white;
        }

        .preto{
            background-color: black;
            color: white;
        }
        td{
            border: 1px solid black;
            width: 100px;
            text-align: center;
            
        }
    </style>
</head>
<body>
    <h1>Criando uma tabela em HTML e CSS</h1>

    <table>
        <tr class="azul">
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr class="amarelo">
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr class="verde">
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr class="preto">
            <td>A4</td>
            <td>B4</td>
        </tr>
        <tr>
            <td>A5</td>
        </tr>
    </table>
    
</body>
</html>
