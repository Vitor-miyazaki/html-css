<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>

    *{
      margin: 0px;
      padding: 0px;
      text-align: center;
    }
    
    html body{
      
      background-color: black;
      
  
      
    }


    section{
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: aqua;
      border-radius: 15px;
      
    }

    .result{
      background-color: blue;
      color: white;
      display: inline-block;
      padding: 20px;
      border-radius: 15px;
      width: 250px;

    }
 
    h1{
      font-size: 1em;
      padding: 10px;
      text-align: center;
    }

   div > p{
    padding: 0px;
   }

   .summary{
    display: inline-block;
    vertical-align: top;
    padding: 20px;
    width: 250px;
    
   }

   p{
    padding: 10px;
   }

   td, th{
    padding: 10px;
   }


   footer{ 
      color: white;
      background-color: silver;
      font-size: 11px;
      text-align: center;
    }
    
    footer a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>
<body>

  <main>
    <section>
      <article class="result">
        <h1>Your Result</h1>
        <div>
          <p style="font-size: 4em;">76</p>
          <p>of 100</p>
        </div>
        <p style="font-size: 1.5em;" >Great</p>
        <p style="font-size: 0.8em;">You scored higher than 65% of <br>
        the people who have taken <br>
        these tests.</p>
      </article>
      
      <article class="summary">
        <h1>Summary</h1>
        <table>
          <tr>
            <th>Reaction</th>
            <td>80 / 100</td>
          </tr>
          <tr>
            <th>Memory</th>
            <td>92 / 100</td>
          </tr>
          <tr>
            <th>Verbal</th>
            <td>61 / 100</td>
          </tr>
          <tr>
            <th>Visual</th>
            <td>72 / 100</td>
          </tr>
        </table>
        <p>Continue</p>
      </article>
    </section>
  </main>
  
  
    <footer>
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="#">Vitor</a>.
    </footer>
  
</body>
</html>
